<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <rect width="192" height="192" rx="32" fill="#0a0a0a"/>
  <rect width="192" height="192" rx="32" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="192" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="curve" x1="20" y1="140" x2="172" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff6b00"/>
      <stop offset="100%" stop-color="#ff2020"/>
    </linearGradient>
  </defs>
  <!-- Grid lines -->
  <line x1="24" y1="60" x2="168" y2="60" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="24" y1="90" x2="168" y2="90" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="24" y1="120" x2="168" y2="120" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="24" y1="150" x2="168" y2="150" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Power curve -->
  <path d="M 24 148 C 50 145 70 130 90 100 C 110 70 130 58 168 52"
        fill="none" stroke="url(#curve)" stroke-width="5" stroke-linecap="round"/>
  <!-- Glow -->
  <path d="M 24 148 C 50 145 70 130 90 100 C 110 70 130 58 168 52"
        fill="none" stroke="#ff2020" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Peak dot -->
  <circle cx="168" cy="52" r="7" fill="#ff2020"/>
  <circle cx="168" cy="52" r="12" fill="#ff2020" opacity="0.2"/>
  <!-- GPS symbol -->
  <circle cx="40" cy="38" r="10" fill="none" stroke="#00e5ff" stroke-width="2.5"/>
  <circle cx="40" cy="38" r="3" fill="#00e5ff"/>
  <line x1="40" y1="28" x2="40" y2="22" stroke="#00e5ff" stroke-width="2"/>
  <line x1="40" y1="48" x2="40" y2="54" stroke="#00e5ff" stroke-width="2"/>
  <line x1="30" y1="38" x2="24" y2="38" stroke="#00e5ff" stroke-width="2"/>
  <line x1="50" y1="38" x2="56" y2="38" stroke="#00e5ff" stroke-width="2"/>
  <!-- Label -->
  <text x="96" y="178" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#666" letter-spacing="4">DYNO</text>
</svg>
